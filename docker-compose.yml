version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: studio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio_password
      POSTGRES_DB: studio_asset_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d studio_asset_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: studio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://studio:studio_password@postgres:5432/studio_asset_system
      MEDIA_ROOT: /app/storage
    volumes:
      - studio_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: studio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - studio_storage:/app/storage:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  studio_storage:
